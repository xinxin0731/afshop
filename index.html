<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AF Web SDK 测试商店</title>

  <!-- ============================================================
    AppsFlyer Web SDK (PBA)
    替换以下两个值后刷新页面即可开始测试：
      AF_WEB_DEV_KEY  → AF 后台 App Settings > Integration > Web SDK
      AF_APP_ID       → 你的 App ID（纯数字或 bundle ID）
  ============================================================ -->
  <script>
    var AF_WEB_DEV_KEY = '6327949c-9402-44a7-a4f6-8e8e92921286';
    var AF_APP_ID      = 'afshop-vercel.vercel.app';
  </script>
  <script>
    !function(t,e,n,s,a,c,i,o,p){
      t.AppsFlyerSdkObject=a,
      t.AF=t.AF||function(){(t.AF.q=t.AF.q||[]).push([Date.now()].concat(Array.prototype.slice.call(arguments)))},
      t.AF.id=t.AF.id||i,t.AF.plugins={},
      o=e.createElement(n),p=e.getElementsByTagName(n)[0],
      o.async=1,o.src="https://websdk.appsflyersdk.com/websdk/"+i+"/"+c+"/sdk",
      p.parentNode.insertBefore(o,p)
    }(window,document,"script",0,"AF",AF_WEB_DEV_KEY,AF_APP_ID,"",0);

    AF('init', { appId: AF_APP_ID, webDevKey: AF_WEB_DEV_KEY, isDebug: true });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #0070f3;
      --brand-dark: #0051b3;
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #d2d2d7;
      --success: #34c759;
      --warn: #ff9f0a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-size: 18px; font-weight: 700; color: var(--brand);
      letter-spacing: -0.5px; cursor: pointer; text-decoration: none;
    }
    .logo span { color: var(--text); }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
    }
    .breadcrumb .sep { color: var(--border); }
    .breadcrumb .current { color: var(--text); font-weight: 600; }
    .back-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px;
      font-size: 13px; color: var(--text); cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background .15s;
    }
    .back-btn:hover { background: var(--bg); }
    .cart-btn {
      position: relative; background: var(--brand); color: #fff;
      border: none; border-radius: 20px;
      padding: 8px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .cart-btn:hover { background: var(--brand-dark); }
    .cart-count {
      position: absolute; top: -6px; right: -6px;
      background: #ff3b30; color: #fff; border-radius: 50%;
      width: 20px; height: 20px; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    /* ── Page 1: Product List ── */
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 20px; margin-bottom: 48px;
    }
    .product-card {
      background: var(--surface); border-radius: var(--radius);
      overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08);
      transition: transform .2s, box-shadow .2s; cursor: pointer;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    .product-img {
      width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px;
    }
    .product-info { padding: 16px; }
    .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-price { font-size: 18px; font-weight: 700; color: var(--brand); margin-bottom: 4px; }
    .product-sku { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
    .view-detail-btn {
      width: 100%; background: var(--bg); color: var(--brand);
      border: 1.5px solid var(--brand); border-radius: 8px;
      padding: 9px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .view-detail-btn:hover { background: #e8f0fe; }

    /* ── Page 2: Product Detail ── */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px; align-items: start;
      margin-bottom: 48px;
    }
    @media (max-width: 700px) { .detail-layout { grid-template-columns: 1fr; } }

    .detail-img-wrap {
      border-radius: var(--radius); overflow: hidden;
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 120px;
    }
    .detail-info {}
    .detail-category {
      font-size: 12px; font-weight: 700; color: var(--brand);
      text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px;
    }
    .detail-name { font-size: 32px; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
    .detail-sku { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .detail-price { font-size: 36px; font-weight: 800; color: var(--brand); margin-bottom: 24px; }
    .detail-desc { font-size: 15px; line-height: 1.7; color: var(--muted); margin-bottom: 24px; }

    .detail-specs {
      background: var(--bg); border-radius: 10px;
      padding: 16px; margin-bottom: 28px;
    }
    .spec-row {
      display: flex; justify-content: space-between;
      font-size: 14px; padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .spec-row:last-child { border-bottom: none; }
    .spec-label { color: var(--muted); }
    .spec-value { font-weight: 600; }

    .detail-actions { display: flex; gap: 12px; }
    .add-to-cart-btn {
      flex: 1; background: var(--brand); color: #fff;
      border: none; border-radius: 10px;
      padding: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .add-to-cart-btn:hover { background: var(--brand-dark); }
    .wishlist-btn {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 14px 18px;
      font-size: 18px; cursor: pointer; transition: background .15s;
    }
    .wishlist-btn:hover { background: #ffe5e5; border-color: #ff3b30; }

    .related-section { margin-top: 16px; }
    .related-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .related-card {
      background: var(--surface); border-radius: 10px;
      padding: 16px; cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      transition: transform .2s, box-shadow .2s;
      display: flex; align-items: center; gap: 12px;
    }
    .related-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .related-icon { font-size: 28px; }
    .related-info {}
    .related-name { font-size: 13px; font-weight: 600; }
    .related-price { font-size: 13px; color: var(--brand); font-weight: 700; }

    /* ── Cart Panel ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 200;
      align-items: flex-start; justify-content: flex-end;
    }
    .overlay.open { display: flex; }
    .cart-panel {
      background: var(--surface); width: 380px; max-width: 100vw;
      height: 100vh; padding: 24px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
    }
    .cart-header { display: flex; justify-content: space-between; align-items: center; }
    .cart-header h2 { font-size: 20px; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
    .cart-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; background: var(--bg); border-radius: 8px;
    }
    .cart-item-icon { font-size: 32px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 600; }
    .cart-item-price { font-size: 13px; color: var(--brand); font-weight: 600; }
    .remove-btn { background: none; border: none; color: #ff3b30; font-size: 18px; cursor: pointer; }
    .cart-empty { text-align: center; color: var(--muted); padding: 40px 0; }
    .cart-total {
      border-top: 1px solid var(--border); padding-top: 16px;
      display: flex; justify-content: space-between; font-size: 16px; font-weight: 700;
    }
    .checkout-btn {
      background: var(--brand); color: #fff; border: none; border-radius: 10px;
      padding: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .checkout-btn:hover { background: var(--brand-dark); }
    .checkout-btn:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── Checkout Modal ── */
    .checkout-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 300;
      align-items: center; justify-content: center;
    }
    .checkout-overlay.open { display: flex; }
    .checkout-panel {
      background: var(--surface); border-radius: var(--radius);
      padding: 32px; width: 460px; max-width: 95vw;
    }
    .checkout-panel h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
    .form-group input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 10px 14px; font-size: 15px; outline: none; transition: border-color .15s;
    }
    .form-group input:focus { border-color: var(--brand); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .order-summary { background: var(--bg); border-radius: 8px; padding: 16px; margin: 20px 0; }
    .order-summary-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .order-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
    .order-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 6px; }
    .pay-btn {
      width: 100%; background: var(--success); color: #fff; border: none; border-radius: 10px;
      padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .pay-btn:hover { background: #28a745; }
    .cancel-link {
      display: block; text-align: center; margin-top: 12px;
      font-size: 13px; color: var(--muted); cursor: pointer; text-decoration: underline;
    }

    /* ── Success Modal ── */
    .success-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 400;
      align-items: center; justify-content: center;
    }
    .success-overlay.open { display: flex; }
    .success-panel {
      background: var(--surface); border-radius: var(--radius);
      padding: 48px 32px; text-align: center; width: 360px; max-width: 95vw;
    }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-panel h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .success-panel p { color: var(--muted); margin-bottom: 24px; }
    .order-id { font-size: 13px; color: var(--muted); background: var(--bg); padding: 8px 16px; border-radius: 6px; display: inline-block; margin-bottom: 24px; }
    .continue-btn {
      background: var(--brand); color: #fff; border: none; border-radius: 10px;
      padding: 12px 32px; font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* ── Debug Log ── */
    .debug-section {
      margin-top: 48px; background: #1c1c1e;
      border-radius: var(--radius); padding: 20px; color: #fff;
    }
    .debug-title {
      font-size: 13px; font-weight: 700; color: #98989d;
      text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .debug-clear {
      background: none; border: 1px solid #48484a; color: #98989d;
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    }
    .debug-log { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; max-height: 240px; overflow-y: auto; }
    .log-entry { padding: 6px 0; border-bottom: 1px solid #2c2c2e; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #636366; margin-right: 8px; }
    .log-event { font-weight: 700; margin-right: 8px; }
    .log-event.page-visit { color: #64d2ff; }
    .log-event.custom { color: var(--warn); }
    .log-data { color: #30d158; }
    .log-empty { color: #636366; font-style: italic; }

    .badge {
      display: inline-block; background: var(--brand); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
      margin-left: 6px; vertical-align: middle;
    }
    .tag {
      display: inline-block; background: var(--bg); color: var(--muted);
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px;
      border: 1px solid var(--border); margin-right: 4px;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <a class="logo" onclick="navigateTo('home')">AF<span>Shop</span></a>
    <div class="breadcrumb" id="breadcrumb" style="display:none">
      <span class="sep">›</span>
      <span class="current" id="breadcrumbName"></span>
    </div>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒 购物车
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<!-- ════════════════════════════════════════════════
  Page 1: 商品列表
════════════════════════════════════════════════ -->
<div class="page active" id="page-home">
  <main>
    <h1 class="page-title">测试商品列表 <span class="badge">AF Web SDK Demo</span></h1>
    <p class="subtitle">点击商品查看详情，或直接加入购物车，全程触发 AF 事件</p>
    <div class="product-grid" id="productGrid"></div>
    <div class="debug-section">
      <div class="debug-title">
        <span>📡 AF 事件日志</span>
        <button class="debug-clear" onclick="clearLog()">清空</button>
      </div>
      <div class="debug-log" id="debugLog">
        <div class="log-empty">等待事件触发...</div>
      </div>
    </div>
  </main>
</div>

<!-- ════════════════════════════════════════════════
  Page 2: 商品详情
════════════════════════════════════════════════ -->
<div class="page" id="page-detail">
  <main>
    <button class="back-btn" onclick="navigateTo('home')" style="margin-bottom:24px">← 返回列表</button>

    <div class="detail-layout">
      <!-- 左：大图 -->
      <div class="detail-img-wrap" id="detailImg"></div>

      <!-- 右：信息 -->
      <div class="detail-info">
        <div class="detail-category" id="detailCategory"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-sku" id="detailSku"></div>
        <div class="detail-price" id="detailPrice"></div>
        <div class="detail-desc" id="detailDesc"></div>
        <div class="detail-specs" id="detailSpecs"></div>
        <div id="detailTags" style="margin-bottom:24px"></div>
        <div class="detail-actions">
          <button class="add-to-cart-btn" id="detailAddBtn" onclick="addToCartFromDetail()">加入购物车</button>
          <button class="wishlist-btn" title="收藏">♡</button>
        </div>
      </div>
    </div>

    <!-- 相关推荐 -->
    <div class="related-section">
      <div class="related-title">相关推荐</div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>

    <!-- Debug log（详情页也保留） -->
    <div class="debug-section" style="margin-top:40px">
      <div class="debug-title">
        <span>📡 AF 事件日志</span>
        <button class="debug-clear" onclick="clearLog()">清空</button>
      </div>
      <div class="debug-log" id="debugLog2"></div>
    </div>
  </main>
</div>

<!-- ── Cart Panel ── -->
<div class="overlay" id="cartOverlay" onclick="handleOverlayClick(event)">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>购物车</h2>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div id="cartItems"><div class="cart-empty">购物车是空的</div></div>
    <div class="cart-total" id="cartTotal" style="display:none">
      <span>合计</span><span id="totalPrice">¥0</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="openCheckout()" disabled>去结账</button>
  </div>
</div>

<!-- ── Checkout Modal ── -->
<div class="checkout-overlay" id="checkoutOverlay">
  <div class="checkout-panel">
    <h2>填写收货信息</h2>
    <div class="form-group"><label>姓名</label><input type="text" placeholder="张三" /></div>
    <div class="form-group"><label>邮箱</label><input type="email" placeholder="zhangsan@example.com" /></div>
    <div class="form-group"><label>收货地址</label><input type="text" placeholder="北京市朝阳区..." /></div>
    <div class="form-row">
      <div class="form-group"><label>卡号（测试）</label><input type="text" placeholder="4242 4242 4242 4242" maxlength="19" /></div>
      <div class="form-group"><label>有效期</label><input type="text" placeholder="12/28" maxlength="5" /></div>
    </div>
    <div class="order-summary" id="checkoutSummary"></div>
    <button class="pay-btn" onclick="completePurchase()">✅ 确认支付</button>
    <span class="cancel-link" onclick="closeCheckout()">取消，返回购物车</span>
  </div>
</div>

<!-- ── Success Modal ── -->
<div class="success-overlay" id="successOverlay">
  <div class="success-panel">
    <div class="success-icon">🎉</div>
    <h2>购买成功！</h2>
    <p>感谢您的订单，AF Purchase 事件已触发</p>
    <div class="order-id" id="orderId"></div><br>
    <button class="continue-btn" onclick="resetShop()">继续购物</button>
  </div>
</div>

<script>
// ================================================================
//  商品数据
// ================================================================
const PRODUCTS = [
  {
    id: 'SKU001', name: 'AirPods Pro', price: 1799, icon: '🎧',
    category: 'audio', categoryLabel: '音频设备',
    desc: '主动降噪，沉浸音效，自适应透明模式。H2 芯片带来更强劲的降噪体验，让你随时专注于当下。',
    tags: ['降噪', 'H2芯片', '防水'],
    specs: [['芯片','H2'], ['续航','6小时（含降噪）'], ['防水','IP54'], ['连接','蓝牙 5.3']]
  },
  {
    id: 'SKU002', name: 'MacBook Air', price: 8999, icon: '💻',
    category: 'computers', categoryLabel: '电脑',
    desc: 'M3 芯片重新定义轻薄笔记本，超长续航，零风扇静音设计，18 小时电池续航。',
    tags: ['M3芯片', '18hr续航', '零风扇'],
    specs: [['芯片','Apple M3'], ['内存','8GB'], ['存储','256GB SSD'], ['屏幕','13.6英寸 Liquid Retina']]
  },
  {
    id: 'SKU003', name: 'iPhone 16', price: 5999, icon: '📱',
    category: 'phones', categoryLabel: '手机',
    desc: 'A18 仿生芯片，专业摄影系统，全新拍摄控制键。支持 Apple Intelligence，随时随地释放创意。',
    tags: ['A18芯片', 'Apple Intelligence', '拍摄控制键'],
    specs: [['芯片','A18 仿生'], ['屏幕','6.1英寸 Super Retina XDR'], ['摄像头','主摄 48MP'], ['5G','支持']]
  },
  {
    id: 'SKU004', name: 'Apple Watch', price: 2999, icon: '⌚',
    category: 'wearables', categoryLabel: '可穿戴',
    desc: '全天候健康监测，血氧、心率、睡眠追踪一应俱全。watchOS 11 带来更智能的运动与健康洞察。',
    tags: ['健康监测', 'watchOS 11', '防水50m'],
    specs: [['屏幕','Always-On Retina'], ['防水','50 米'], ['续航','18 小时'], ['芯片','S9 SiP']]
  },
];

const CARD_COLORS = ['#e8f4fd','#fef3e2','#e8faf0','#fce8f3'];
let currentProductId = null;
let cart = [];

// ================================================================
//  AF 事件工具
// ================================================================
function afPageVisit() {
  if (typeof AF !== 'undefined') {
    AF('pba', 'event', { eventType: 'PAGE_VISIT' });
  } else {
    console.warn('[AF] SDK 未加载，PAGE_VISIT 已跳过');
  }
  logEvent('PAGE_VISIT', { url: location.href }, true);
}

function afEvent(eventName, eventValue) {
  if (typeof AF !== 'undefined') {
    AF('pba', 'event', { eventType: 'EVENT', eventName, eventValue });
  } else {
    console.warn('[AF] SDK 未加载，事件已跳过:', eventName);
  }
  logEvent(eventName, eventValue, false);
}

// ================================================================
//  Debug 日志（两个页面共用同一条日志流）
// ================================================================
function logEvent(name, data, isPageVisit) {
  const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
  const cls  = isPageVisit ? 'page-visit' : 'custom';
  const html = `<span class="log-time">${time}</span><span class="log-event ${cls}">${name}</span><span class="log-data">${JSON.stringify(data)}</span>`;

  ['debugLog','debugLog2'].forEach(id => {
    const log = document.getElementById(id);
    if (!log) return;
    const empty = log.querySelector('.log-empty');
    if (empty) empty.remove();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = html;
    log.prepend(entry);
  });
}

function clearLog() {
  ['debugLog','debugLog2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<div class="log-empty">等待事件触发...</div>';
  });
}

// ================================================================
//  路由：页面切换
// ================================================================
function navigateTo(page, productId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  if (page === 'home') {
    document.getElementById('page-home').classList.add('active');
    document.getElementById('breadcrumb').style.display = 'none';
    history.pushState({page:'home'}, '', '#/');
    afPageVisit();

  } else if (page === 'detail') {
    currentProductId = productId;
    renderDetailPage(productId);
    document.getElementById('page-detail').classList.add('active');
    const p = PRODUCTS.find(x => x.id === productId);
    document.getElementById('breadcrumb').style.display = 'flex';
    document.getElementById('breadcrumbName').textContent = p.name;
    history.pushState({page:'detail', productId}, '', `#/product/${productId}`);
    afPageVisit();
    // af_content_view（商品详情浏览）
    afEvent('af_content_view', {
      af_content_id: p.id,
      af_content_type: p.category,
      af_content: p.name,
      af_currency: 'CNY',
      af_price: p.price
    });
  }

  window.scrollTo(0, 0);
}

window.addEventListener('popstate', e => {
  const hash = location.hash;
  if (hash.startsWith('#/product/')) {
    const id = hash.replace('#/product/', '');
    navigateTo('detail', id);
  } else {
    navigateTo('home');
  }
});

// ================================================================
//  Page 1: 渲染商品列表
// ================================================================
function renderProducts() {
  document.getElementById('productGrid').innerHTML = PRODUCTS.map((p, idx) => `
    <div class="product-card" onclick="navigateTo('detail','${p.id}')">
      <div class="product-img" style="background:${CARD_COLORS[idx]}">${p.icon}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-sku">SKU: ${p.id}</div>
        <div class="product-price">¥${p.price.toLocaleString()}</div>
        <button class="view-detail-btn" onclick="event.stopPropagation();navigateTo('detail','${p.id}')">查看详情 →</button>
      </div>
    </div>
  `).join('');
}

// ================================================================
//  Page 2: 渲染商品详情
// ================================================================
function renderDetailPage(productId) {
  const p = PRODUCTS.find(x => x.id === productId);
  const idx = PRODUCTS.indexOf(p);

  document.getElementById('detailImg').style.background = CARD_COLORS[idx];
  document.getElementById('detailImg').textContent = p.icon;
  document.getElementById('detailCategory').textContent = p.categoryLabel;
  document.getElementById('detailName').textContent = p.name;
  document.getElementById('detailSku').textContent = 'SKU: ' + p.id;
  document.getElementById('detailPrice').textContent = '¥' + p.price.toLocaleString();
  document.getElementById('detailDesc').textContent = p.desc;

  document.getElementById('detailSpecs').innerHTML = p.specs.map(([k, v]) =>
    `<div class="spec-row"><span class="spec-label">${k}</span><span class="spec-value">${v}</span></div>`
  ).join('');

  document.getElementById('detailTags').innerHTML = p.tags.map(t =>
    `<span class="tag">${t}</span>`
  ).join('');

  // 相关推荐（其他商品）
  const related = PRODUCTS.filter(x => x.id !== productId);
  document.getElementById('relatedGrid').innerHTML = related.map((r, i) => `
    <div class="related-card" onclick="navigateTo('detail','${r.id}')">
      <div class="related-icon">${r.icon}</div>
      <div class="related-info">
        <div class="related-name">${r.name}</div>
        <div class="related-price">¥${r.price.toLocaleString()}</div>
      </div>
    </div>
  `).join('');
}

// ================================================================
//  购物车
// ================================================================
function addToCart(skuId) {
  const product = PRODUCTS.find(p => p.id === skuId);
  const existing = cart.find(i => i.id === skuId);
  if (existing) { existing.qty++; } else { cart.push({ ...product, qty: 1 }); }
  updateCartUI();
  afEvent('af_add_to_cart', {
    af_content_id: product.id, af_content_type: product.category,
    af_content: product.name, af_currency: 'CNY',
    af_revenue: product.price, af_quantity: 1
  });
}

function addToCartFromDetail() {
  addToCart(currentProductId);
  // 短暂反馈
  const btn = document.getElementById('detailAddBtn');
  btn.textContent = '✓ 已加入';
  btn.style.background = var_success();
  setTimeout(() => { btn.textContent = '加入购物车'; btn.style.background = ''; }, 1200);
}
function var_success() { return '#34c759'; }

function removeFromCart(skuId) {
  cart = cart.filter(i => i.id !== skuId);
  updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const count = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = count;
  const itemsEl = document.getElementById('cartItems');
  if (cart.length === 0) {
    itemsEl.innerHTML = '<div class="cart-empty">购物车是空的</div>';
    document.getElementById('cartTotal').style.display = 'none';
    document.getElementById('checkoutBtn').disabled = true;
  } else {
    itemsEl.innerHTML = cart.map(i => `
      <div class="cart-item">
        <div class="cart-item-icon">${i.icon}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name} × ${i.qty}</div>
          <div class="cart-item-price">¥${(i.price*i.qty).toLocaleString()}</div>
        </div>
        <button class="remove-btn" onclick="removeFromCart('${i.id}')">🗑</button>
      </div>`).join('');
    document.getElementById('totalPrice').textContent = '¥' + total.toLocaleString();
    document.getElementById('cartTotal').style.display = 'flex';
    document.getElementById('checkoutBtn').disabled = false;
  }
}

function openCart() { document.getElementById('cartOverlay').classList.add('open'); }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('cartOverlay')) closeCart(); }

// ================================================================
//  结账
// ================================================================
function openCheckout() {
  closeCart();
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  afEvent('af_initiate_checkout', {
    af_content_id: cart.map(i => i.id), af_currency: 'CNY',
    af_revenue: total, af_num_items: cart.reduce((s, i) => s + i.qty, 0)
  });
  document.getElementById('checkoutSummary').innerHTML = `
    <div class="order-summary-title">订单摘要</div>
    ${cart.map(i => `<div class="order-line"><span>${i.name} × ${i.qty}</span><span>¥${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}
    <div class="order-total"><span>总计</span><span>¥${total.toLocaleString()}</span></div>`;
  document.getElementById('checkoutOverlay').classList.add('open');
}

function closeCheckout() {
  document.getElementById('checkoutOverlay').classList.remove('open');
  openCart();
}

function completePurchase() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const orderId = 'ORD-' + Date.now();
  afEvent('af_purchase', {
    af_content_id: cart.map(i => i.id), af_content_type: 'electronics',
    af_currency: 'CNY', af_revenue: total,
    af_order_id: orderId, af_num_items: cart.reduce((s, i) => s + i.qty, 0)
  });
  document.getElementById('checkoutOverlay').classList.remove('open');
  document.getElementById('orderId').textContent = '订单号：' + orderId;
  document.getElementById('successOverlay').classList.add('open');
}

function resetShop() {
  cart = [];
  updateCartUI();
  document.getElementById('successOverlay').classList.remove('open');
  navigateTo('home');
}

// ================================================================
//  初始化
// ================================================================
window.addEventListener('load', function() {
  renderProducts();
  // 根据 URL hash 决定初始页面
  const hash = location.hash;
  if (hash.startsWith('#/product/')) {
    const id = hash.replace('#/product/', '');
    if (PRODUCTS.find(p => p.id === id)) {
      navigateTo('detail', id);
      return;
    }
  }
  navigateTo('home');
});
</script>
</body>
</html>
